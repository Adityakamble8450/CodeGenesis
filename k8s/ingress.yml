apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codegenesis-ingress
  labels:
    app.kubernetes.io/name: codegenesis-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: 
    http:
      paths:
      - path: /api/sandbox
        pathType: Prefix
        backend:
          service:
            name: sandbox-service
            port:
              number: 80
